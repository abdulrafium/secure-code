version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: secure_code_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: securepassword123
      POSTGRES_DB: secure_code_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - secure_code_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d secure_code_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: secure_code_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - secure_code_network

  backend:
    build: ./backend
    container_name: secure_code_backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://admin:securepassword123@postgres:5432/secure_code_db?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=3001
      - NODE_ENV=production
      - JWT_SECRET=super-secret-change-this-in-production
    volumes:
      - workspaces_data:/workspaces
      - sessions_data:/sessions
    networks:
      - secure_code_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3001}
        - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://localhost:3001}
        - BACKEND_INTERNAL_URL=http://backend:3001
    container_name: secure_code_frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - BACKEND_INTERNAL_URL=http://backend:3001
    networks:
      - secure_code_network
    depends_on:
      - backend

  nginx:
    build: ./nginx
    container_name: secure_code_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    networks:
      - secure_code_network
    depends_on:
      - frontend
      - backend
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/nginx/ssl

  certbot:
    image: certbot/certbot
    container_name: secure_code_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - secure_code_network

volumes:
  postgres_data:
  redis_data:
  workspaces_data:
  certbot_www:
  certbot_conf:
  sessions_data:

networks:
  secure_code_network:
    driver: bridge
