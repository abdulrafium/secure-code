version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: secure_code_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: securepassword123
      POSTGRES_DB: secure_code_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - secure_code_network

  redis:
    image: redis:7-alpine
    container_name: secure_code_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - secure_code_network

  backend:
    build: ./backend
    container_name: secure_code_backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://admin:securepassword123@postgres:5432/secure_code_db?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=3001
      - NODE_ENV=production
      - JWT_SECRET=super-secret-change-this-in-production
    ports:
      - "3001:3001"
    networks:
      - secure_code_network
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3001}
        - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://localhost:3001}
    container_name: secure_code_frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    ports:
      - "3000:3000"
    networks:
      - secure_code_network
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:

networks:
  secure_code_network:
    driver: bridge
