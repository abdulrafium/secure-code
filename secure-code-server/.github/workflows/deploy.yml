name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Execute Deployment Commands via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            # Navigate to the project directory (Change this if your folder name is different)
            cd secure-code-server
            
            # Pull the latest code from GitHub
            git pull origin main
            
            # Stop the current running containers safely
            sudo docker-compose down
            
            # Rebuild and start the containers in the background
            sudo docker-compose up --build -d
